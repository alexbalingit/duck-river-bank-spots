<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>Duck River — Columbia Bank Spots Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{ --ink:#1f2421; --cream:#f6f1e7; --gold:#c79a3b; --green:#2e7d32; --rust:#b5532a; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  #map{position:absolute;inset:0;z-index:1}
  /* Header */
  .hdr{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(31,36,33,.92);color:var(--cream);
       padding:8px 12px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(4px)}
  .hdr h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px}
  .hdr .sub{font-size:11px;opacity:.8;margin-left:auto}
  /* Legend */
  .legend{position:absolute;left:10px;bottom:18px;z-index:1000;background:rgba(246,241,231,.95);
          border-radius:10px;padding:9px 11px;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.25);line-height:1.7}
  .legend b{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;color:#555}
  .dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px;vertical-align:middle;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .za{background:var(--green)} .zb{background:var(--gold)} .zc{background:var(--rust)}
  .legend .row{white-space:nowrap}
  .legend .key{margin-top:6px;font-size:11px;color:#555}
  /* Marker pins */
  .pin{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
       border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
  .pin span{transform:rotate(45deg);font-size:12px;font-weight:700;color:#fff}
  .pin.water{border-radius:50%;width:20px;height:20px;opacity:.95}
  .pin.water span{font-size:11px}
  /* Popup */
  .leaflet-popup-content{margin:10px 12px;font-size:13px;line-height:1.5}
  .pop h3{margin:0 0 4px;font-size:14px}
  .pop .z{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:1px 6px;border-radius:6px;color:#fff}
  .pop p{margin:6px 0}
  .pop a.btn{display:inline-block;margin:3px 4px 0 0;padding:6px 9px;border-radius:7px;font-size:12px;font-weight:600;
             text-decoration:none;color:#fff}
  .pop a.park{background:#374b43} .pop a.water{background:var(--gold);color:#1f2421}
  .pop a.dir{background:#2b6cb0}
  .pop .co{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#555}
</style>
</head>
<body>
<div class="hdr"><h1>🎣 Duck River — Columbia Bank Spots</h1><span class="sub">10 spots · <a href="logger.html" style="color:var(--gold);text-decoration:none;font-weight:700">🐟 Log a catch →</a></span></div>
<div id="map"></div>
<div class="legend">
  <b>What you'll catch</b>
  <div class="row"><span class="dot za"></span>Smallmouth — fast, rocky, wadeable</div>
  <div class="row"><span class="dot zb"></span>Largemouth — slow &amp; deep</div>
  <div class="row"><span class="dot zc"></span>Mixed + catfish — gravel bars &amp; pools</div>
  <div class="key">📍 = park · 🎣 = water · tap a pin</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const ZONE = {
  A:{c:'#2e7d32',label:'Smallmouth water · fast, rocky, wadeable'},
  B:{c:'#c79a3b',label:'Largemouth water · slow & deep'},
  C:{c:'#b5532a',label:'Mixed + catfish · gravel bars & pools'}
};
const spots = [
 {n:'1 · Iron Bridge ⭐',z:'B',park:[35.6119,-87.0028],water:[35.61157,-87.00285],d:'~40 yd',sp:'Largemouth, Spotted, Channel catfish; some Smallmouth on the rock; bluegill',note:'Best parking near town. Deep slackwater off the old dam site — bluff edges, laydowns, bridge piers.'},
 {n:'2 · Yanahli Park',z:'B',park:[35.6090,-86.9993],water:[35.60973,-86.99786],d:'~170 yd',sp:'Largemouth, Spotted, Channel catfish, bluegill',note:'Paved trail, river on 3 sides. Walk to inside bends + wood. Low pressure.'},
 {n:'3 · Riverwalk Park',z:'B',park:[35.6190,-87.0244],water:[35.61823,-87.02482],d:'~100 yd',sp:'Largemouth, Spotted, bluegill, Channel catfish',note:'Downtown impoundment. Old stone bridge piers = the cover. Family-friendly paved bank. Stay clear of the dam.'},
 {n:'4 · Riverside Drive Access',z:'B',park:[35.6184,-87.0251],water:[35.61823,-87.02482],d:'~35 yd',sp:'Largemouth, Spotted, Smallmouth (first current breaks), Channel catfish',note:'TWRA ramp BELOW the dam. First current breaks of Zone C. Fish downstream — never toward the dam.'},
 {n:'5 · Chickasaw Trace ⭐',z:'C',park:[35.6628,-87.0932],water:[35.66260,-87.09369],d:'~55 yd',sp:'Smallmouth (shoals), Largemouth & Spotted (pools + Knob Creek mouth), Rock bass, Channel catfish',note:'Ramp + wadeable shoals + Knob Creek mouth (the seam is the prize). Park closes at dark.'},
 {n:'6 · Williamsport Bridge',z:'C',park:[35.6949,-87.2208],water:[35.69455,-87.22096],d:'~45 yd',sp:'Channel catfish ⭐ (some 20"+), Blue catfish (deep bluff holes), Largemouth, Spotted, Smallmouth (gravel)',note:'Gravel bars + deep bluff holes. Best catfish numbers in Middle TN. Limited parking.'},
 {n:'7 · Leftwich / Sowell Mill ⭐',z:'A',park:[35.5725,-86.8693],water:[35.57258,-86.86949],d:'~20 yd',sp:'Smallmouth ⭐, Rock bass, Spotted, Largemouth (pools)',note:'Yanahli public land, bank both sides. Old mill = current pinch + eddy. Best near-town smallmouth shot.'},
 {n:'8 · Fountain Creek',z:'A',park:[35.5678,-86.9644],water:[35.56849,-86.96433],d:'~85 yd',sp:'Smallmouth ⭐, Rock bass, Spotted, Largemouth (creek mouth/pools), Channel catfish',note:'Remote. 1.5mi chert road, NO cell service, dirt trail to a gravel bar at the creek-mouth ambush seam.'},
 {n:'9 · Carpenter Bridge',z:'A',park:[35.6176,-86.8659],water:[35.61790,-86.85700],d:'~40 yd',sp:'Smallmouth ⭐, Rock bass, Spotted',note:'Steps to the water. Bridge pilings = current break + shade. Rocky upper-Duck, smallmouth + rock bass.'},
 {n:'10 · Hardison Mill',z:'A',park:[35.6087,-86.8222],water:[35.60869,-86.82210],d:'~10 yd',sp:'Smallmouth ⭐, Rock bass, Spotted (swift rocky water)',note:'The rapid — Class II at a broken mill dam. Most oxygen + biggest eddies = summer smallmouth stack.'}
];

const map = L.map('map',{zoomControl:true}).setView([35.61,-87.00],11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19, attribution:'&copy; OpenStreetMap'
}).addTo(map);

function pin(color, glyph, water){
  return L.divIcon({className:'',
    html:`<div class="pin${water?' water':''}" style="background:${color}"><span>${glyph}</span></div>`,
    iconSize:water?[20,20]:[26,26], iconAnchor:water?[10,10]:[13,26], popupAnchor:[0,water?-10:-24]});
}
function gmaps(ll){return `https://www.google.com/maps/search/?api=1&query=${ll[0]},${ll[1]}`;}
function gdir(ll){return `https://www.google.com/maps/dir/?api=1&destination=${ll[0]},${ll[1]}`;}

const bounds = [];
spots.forEach(s=>{
  const col = ZONE[s.z].c;
  bounds.push(s.park, s.water);
  // dashed line park -> water
  L.polyline([s.park,s.water],{color:col,weight:2,dashArray:'4,5',opacity:.7}).addTo(map);
  const html = `<div class="pop">
     <h3>${s.n}</h3>
     <span class="z" style="background:${col}">${ZONE[s.z].label}</span>
     <p>${s.note}</p>
     <p style="margin:6px 0"><b>🐟 Fish here:</b> ${s.sp}</p>
     <p class="co">📍 park ${s.park[0]}, ${s.park[1]}<br>🎣 water ${s.water[0]}, ${s.water[1]} &nbsp;·&nbsp; walk ${s.d}</p>
     <a class="btn park" href="${gmaps(s.park)}" target="_blank" rel="noopener">📍 Park pin</a>
     <a class="btn water" href="${gmaps(s.water)}" target="_blank" rel="noopener">🎣 Water pin</a>
     <a class="btn dir" href="${gdir(s.park)}" target="_blank" rel="noopener">🧭 Navigate</a>
   </div>`;
  L.marker(s.park,{icon:pin(col,'📍',false)}).addTo(map).bindPopup(html,{maxWidth:260});
  L.marker(s.water,{icon:pin(col,'🎣',true)}).addTo(map).bindPopup(html,{maxWidth:260});
});
map.fitBounds(bounds,{padding:[50,50]});
</script>
</body>
</html>
